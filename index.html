<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, orientation=landscape">
  <title>🔥 BẾP TRƯỞNG · SỬA LỖI DI CHUYỂN</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
    body { background:#020a0e; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:Arial,sans-serif; touch-action:none; margin:0; overflow:hidden; position:fixed; width:100%; height:100%; }
    #orientationWarning { position:fixed; top:0; left:0; right:0; bottom:0; background:#0a141c; color:#ffdfa0; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; text-align:center; padding:20px; font-size:24px; }
    #orientationWarning .rotate-icon { font-size:70px; margin-bottom:20px; animation:swing 1.8s infinite; }
    @keyframes swing { 0%,100%{transform:rotate(0)}25%{transform:rotate(-25deg)}75%{transform:rotate(25deg)} }
    .game-container { position:relative; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; background:#0e1c26; overflow:hidden; box-shadow:inset 0 0 80px rgba(0,0,0,0.7); }
    canvas { display:block; width:auto; height:100%; aspect-ratio:16/9; background:#0e1c26; touch-action:none; image-rendering:auto; box-shadow:0 0 40px rgba(0,0,0,0.9); border:2px solid #e2a43b; border-radius:12px; }
    #ui-layer { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:20; }
    .top-left { position:absolute; top:10px; left:10px; display:flex; gap:10px; background:rgba(2,12,20,0.8); backdrop-filter:blur(12px); padding:8px 18px; border-radius:40px; border:1.5px solid #f0be5e; box-shadow:0 6px 16px rgba(0,0,0,0.6); color:#fff4de; font-weight:bold; font-size:18px; pointer-events:auto; }
    .top-left span { display:flex; align-items:center; gap:4px; color:#ffdfa0; }
    #pauseBtn, #tutorialBtn { position:absolute; top:10px; background:rgba(2,12,20,0.8); backdrop-filter:blur(12px); border:1.5px solid #f0be5e; color:#ffdfa0; font-size:20px; padding:8px 16px; border-radius:40px; font-weight:bold; pointer-events:auto; cursor:pointer; box-shadow:0 6px 16px rgba(0,0,0,0.6); }
    #pauseBtn { right:10px; } #tutorialBtn { right:100px; }
    #inventoryDisplay { position:absolute; bottom:10px; left:10px; background:rgba(2,12,20,0.8); backdrop-filter:blur(12px); padding:8px 20px; border-radius:40px; color:#f5e3c1; font-size:20px; border:1.5px solid #f0be5e; pointer-events:auto; box-shadow:0 6px 16px rgba(0,0,0,0.6); display:flex; align-items:center; gap:8px; }
    #dayTarget { position:absolute; bottom:10px; right:10px; background:rgba(2,12,20,0.75); backdrop-filter:blur(12px); color:#c9e4ff; padding:8px 18px; border-radius:40px; font-size:16px; border:1.5px solid #6fb3e0; font-weight:bold; pointer-events:auto; box-shadow:0 6px 16px rgba(0,0,0,0.6); }
    #recipeBar { position:absolute; bottom:10px; left:210px; right:190px; display:flex; justify-content:center; align-items:center; gap:12px; background:rgba(2,12,20,0.75); backdrop-filter:blur(12px); padding:6px 16px; border-radius:40px; border:1.5px solid #f0be5e; color:#fff4de; font-size:16px; font-weight:bold; pointer-events:none; box-shadow:0 6px 16px rgba(0,0,0,0.6); white-space:nowrap; }
    .recipe-item { display:flex; align-items:center; gap:3px; background:rgba(20,40,55,0.7); padding:4px 12px; border-radius:24px; border-left:3px solid #ffb347; }
    #interactHint { position:absolute; bottom:75px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.5); color:#ffdb8e; padding:6px 18px; border-radius:24px; font-size:16px; border:1px solid #ffb347; pointer-events:none; backdrop-filter:blur(6px); white-space:nowrap; }
    #fridgePopup { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(15,30,40,0.95); backdrop-filter:blur(16px); padding:20px; border-radius:24px; border:2px solid #f0be5e; color:#fff4de; display:none; z-index:30; pointer-events:auto; font-size:18px; text-align:center; box-shadow:0 20px 40px black; }
    .fridge-item { display:inline-block; padding:8px 16px; margin:6px; background:rgba(40,60,80,0.8); border-radius:16px; cursor:pointer; border:1px solid #ffb347; font-size:22px; }
    .fridge-item:hover { background:#ffb34733; }
    #starPopup { position:absolute; top:30%; left:50%; transform:translate(-50%,-50%); font-size:48px; pointer-events:none; z-index:25; display:none; text-shadow:0 0 20px gold; animation:starPop 1.5s forwards; }
    @keyframes starPop { 0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}50%{opacity:1;transform:translate(-50%,-60%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)} }
    .menu-overlay, .pause-overlay, .shop-overlay, .gameover-overlay, .tutorial-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(20px); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:40; pointer-events:auto; color:white; text-align:center; padding:30px; }
    .menu-overlay h1 { font-size:64px; color:#ffce7a; text-shadow:6px 6px 0 #9e6018; }
    .btn { background:linear-gradient(145deg,#ffc35c,#f5a623); border:none; color:#14232b; font-weight:bold; font-size:24px; padding:12px 36px; margin:10px; border-radius:50px; box-shadow:0 10px 0 #9e6018,0 8px 20px black; cursor:pointer; transition:all 0.08s; border:2px solid #ffe6b0; min-width:200px; }
    .btn:active { transform:translateY(6px); box-shadow:0 4px 0 #9e6018,0 6px 12px black; }
    .shop-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:16px; max-width:800px; margin:16px 0; }
    .shop-item { background:rgba(20,40,55,0.9); padding:16px; border-radius:24px; width:200px; border:2px solid #ffc35c; color:#f5e3c1; box-shadow:inset 0 2px 8px rgba(0,0,0,0.6),0 8px 0 #0e1f28; }
    .shop-item .btn { font-size:18px; padding:8px 14px; min-width:unset; width:100%; margin:8px 0 0; }
    .hidden { display:none !important; }
    #messagePopup { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#1e2f3a; color:#ffdfa0; padding:14px 28px; border-radius:40px; font-weight:bold; font-size:28px; border:3px solid #ffb347; z-index:30; white-space:nowrap; pointer-events:none; box-shadow:0 15px 30px black; text-shadow:2px 2px 0 #0a141c; }
    @media (orientation:portrait) { #orientationWarning { display:flex; } .game-container { display:none; } }
    @media (max-width:900px) { .top-left { font-size:15px; padding:6px 12px; } #pauseBtn, #tutorialBtn { font-size:16px; padding:6px 12px; } #tutorialBtn { right:80px; } #inventoryDisplay { font-size:16px; padding:6px 14px; } #recipeBar { font-size:13px; left:180px; right:160px; } }
  </style>
</head>
<body>
<div id="orientationWarning"><div class="rotate-icon">📱↻</div><div>Vui lòng xoay ngang điện thoại</div></div>
<div class="game-container">
  <canvas id="gameCanvas" width="1280" height="720"></canvas>
  <div id="ui-layer">
    <div class="top-left"><span>💰 <span id="moneyVal">250</span></span><span>⭐ <span id="repVal">100</span></span><span>📅 <span id="dayVal">1</span></span></div>
    <button id="tutorialBtn">📖</button><button id="pauseBtn">⏸️</button>
    <div id="inventoryDisplay">🎒 <span id="invText">Trống</span></div>
    <div id="dayTarget">🎯 <span id="targetMoney">300</span> / <span id="earnedToday">0</span></div>
    <div id="recipeBar"><div class="recipe-item"><span>🍕</span> 🍅🧀🍞</div><div class="recipe-item"><span>🍔</span> 🥩🥬🍞</div></div>
    <div id="interactHint"></div><div id="fridgePopup"></div><div id="starPopup"></div>
  </div>
  <div id="messagePopup"></div>

  <div id="mainMenu" class="menu-overlay"><h1>🍳 BẾP TRƯỞNG</h1><p style="margin-bottom:20px;color:#eee;font-size:24px;">Nấu ăn · Phục vụ · Nâng cấp</p>
    <button class="btn" id="startGameBtn">▶ BẮT ĐẦU</button><button class="btn" id="tutorialMenuBtn">📖 HƯỚNG DẪN</button></div>
  <div id="tutorialOverlay" class="tutorial-overlay hidden"><h2 style="font-size:48px;color:#ffce7a;">📖 HƯỚNG DẪN</h2><p style="margin:20px;">Chọn món để xem quy trình tự động</p>
    <button class="btn" id="tutPizza">🍕 Pizza</button><button class="btn" id="tutBurger">🍔 Burger</button><button class="btn" id="tutBack">🔙 QUAY LẠI</button></div>
  <div id="pauseMenu" class="pause-overlay hidden"><h2 style="font-size:56px;color:#ffce7a;">⏸️ TẠM DỪNG</h2>
    <button class="btn" id="resumeBtn">▶ TIẾP TỤC</button><button class="btn" id="quitToMenuBtn">🚪 THOÁT</button></div>
  <div id="shopMenu" class="shop-overlay hidden"><h2 style="font-size:48px;color:#ffce7a;">🛒 NÂNG CẤP</h2><div class="shop-grid" id="shopItemsContainer"></div><button class="btn" id="nextDayBtn">🌙 NGÀY MỚI</button></div>
  <div id="gameoverMenu" class="gameover-overlay hidden"><h2 style="font-size:60px;color:#ff6b6b;">💔 GAME OVER</h2><p style="margin:30px;">Uy tín về 0...</p><button class="btn" id="restartBtn">🔄 CHƠI LẠI</button></div>
</div>

<script>
(function(){
  "use strict";
  const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
  const CW=1280, CH=720, GAME_W=1600, GAME_H=1080;
  const SCALE_X=CW/GAME_W, SCALE_Y=CH/GAME_H;

  // UI
  const moneySpan=document.getElementById('moneyVal'), repSpan=document.getElementById('repVal'), daySpan=document.getElementById('dayVal');
  const invSpan=document.getElementById('invText'), targetSpan=document.getElementById('targetMoney'), earnedSpan=document.getElementById('earnedToday');
  const msgPopup=document.getElementById('messagePopup'), interactHint=document.getElementById('interactHint');
  const fridgePopup=document.getElementById('fridgePopup'), starPopup=document.getElementById('starPopup');

  let audioCtx=null;
  function initAudio(){if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
  function playSfx(n){if(!audioCtx)initAudio();if(audioCtx.state==='suspended')audioCtx.resume();const t=audioCtx.currentTime;const g=audioCtx.createGain();g.gain.value=0.08;const o=audioCtx.createOscillator();if(n==='pick')o.frequency.value=680;else if(n==='chop')o.frequency.value=260;else if(n==='cook')o.frequency.value=400;else if(n==='serve')o.frequency.value=1020;o.connect(g).connect(audioCtx.destination);o.start();o.stop(t+0.1);}

  let gameState='menu', money=250, reputation=100, day=1, dayTarget=300, earnedToday=0;
  const chef={x:400,y:500,r:20,inventory:null,walkFrame:0,faceDir:1};
  let frame=0, fridgeInventory={tomato:3,meat:3,bread:3,lettuce:3,cheese:3}, dirtyPlates=0, cleanPlates=4;

  const CELL=40, GRID_W=Math.floor(GAME_W/CELL), GRID_H=Math.floor(GAME_H/CELL);

  const fridge={x:80,y:80,w:100,h:130,name:'Tủ lạnh',type:'fridge'};
  const board={x:250,y:200,w:130,h:90,active:false,progress:0,max:100,item:null,name:'Thớt',type:'board'};
  const stove={x:120,y:650,w:160,h:130,active:false,progress:0,max:150,ready:false,burnt:false,burnTimer:0,name:'Bếp',type:'stove'};
  const stove2={x:320,y:650,w:160,h:130,active:false,progress:0,max:150,ready:false,burnt:false,burnTimer:0,unlocked:false,name:'Bếp phụ',type:'stove'};
  const sink={x:550,y:200,w:90,h:70,name:'Bồn rửa',type:'sink'};
  const plateStation={x:500,y:100,w:90,h:70,name:'Đĩa sạch',type:'plate'};
  const trash={x:650,y:650,w:90,h:90,name:'Thùng rác',type:'trash'};
  const checkinDesk={x:850,y:380,w:70,h:50,name:'Quầy tiếp tân',type:'checkin'};

  const tables=[
    {x:960,y:260,w:130,h:90,seats:[{x:990,y:300},{x:1060,y:300}]},
    {x:1150,y:260,w:130,h:90,seats:[{x:1180,y:300},{x:1250,y:300}]},
    {x:960,y:460,w:130,h:90,seats:[{x:990,y:500},{x:1060,y:500}]},
    {x:1150,y:460,w:130,h:90,seats:[{x:1180,y:500},{x:1250,y:500}]},
    {x:960,y:660,w:130,h:90,seats:[{x:990,y:700},{x:1060,y:700}]},
    {x:1150,y:660,w:130,h:90,seats:[{x:1180,y:700},{x:1250,y:700}]},
  ];

  const walls=[{x:0,y:0,w:GAME_W,h:20},{x:0,y:GAME_H-20,w:GAME_W,h:20},{x:0,y:0,w:20,h:GAME_H},{x:GAME_W-20,y:0,w:20,h:GAME_H},{x:780,y:300,w:20,h:500}];
  const allStations=[fridge,board,stove,stove2,sink,plateStation,trash,checkinDesk];
  const collisionRects=[...walls,...tables,...allStations];

  let upgrades={speed:1, chopSpeed:1, cookSpeed:1, extraStove:false, patienceBonus:0};
  let customers=[], customerQueue=[], particles=[], target=null, path=[];
  const BASE_SPEED=5.5, BASE_PATIENCE=650;
  const RECIPES={
    'pizza':{ingredients:['tomato_chopped','cheese','bread'],price:25},
    'burger':{ingredients:['meat_cooked','lettuce_chopped','bread'],price:30}
  };
  let popupTimer=0, nearObject=null, showFridgePopup=false, starShowTimer=0, starText='';

  // ========== VẼ CHI TIẾT ==========
  function drawDetailedFridge(x,y,w,h){ /*... giữ nguyên ...*/ ctx.shadowBlur=18; ctx.fillStyle='#b0c4de'; ctx.fillRect(x,y,w,h); ctx.fillStyle='#9ab3d0'; ctx.fillRect(x+10,y+10,35,55); ctx.fillRect(x+55,y+10,35,55); ctx.fillStyle='#c0c0c0'; ctx.fillRect(x+45,y+25,6,30); ctx.fillRect(x+95,y+25,6,30); ctx.fillStyle='#1a2a3a'; ctx.fillRect(x+40,y+75,30,15); ctx.fillStyle='#0f0'; ctx.font='bold 10px monospace'; ctx.fillText('4°C',x+43,y+87); ctx.fillStyle='#ffaa00'; ctx.beginPath(); ctx.arc(x+85,y+40,8,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#ff5500'; ctx.beginPath(); ctx.arc(x+25,y+115,6,0,2*Math.PI); ctx.fill(); ctx.font='bold 44px Arial'; ctx.fillStyle='#fff9e6'; ctx.fillText('🥩',x+15,y+122); ctx.fillText('🍅',x+62,y+122); ctx.shadowBlur=0; }
  function drawDetailedBoard(x,y,w,h,active,progress,max,item){ /*... giữ nguyên ...*/ ctx.shadowBlur=14; ctx.fillStyle='#c9a87c'; ctx.fillRect(x,y,w,h); for(let i=0;i<5;i++){ ctx.strokeStyle='#9c7a54'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x+10,y+14+i*16); ctx.lineTo(x+w-10,y+10+i*16); ctx.stroke(); } ctx.fillStyle='#555'; ctx.fillRect(x+w-24,y+30,14,45); ctx.fillStyle='#aaa'; ctx.fillRect(x+w-30,y+20,24,15); if(active){ ctx.fillStyle='#ff9800'; ctx.fillRect(x+12,y+h-16,(progress/max)*(w-24),10); } if(item){ ctx.font='40px Arial'; ctx.fillStyle='#2d1e0e'; ctx.fillText(item.icon||'?',x+50,y+70); } ctx.shadowBlur=0; }
  function drawDetailedStove(x,y,w,h,active,ready,burnt,progress,max){ /*... giữ nguyên ...*/ ctx.shadowBlur=20; ctx.fillStyle='#2a3a45'; ctx.fillRect(x,y,w,h); ctx.fillStyle='#1e272e'; ctx.beginPath(); ctx.ellipse(x+w/2,y+45,65,36,0,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#555'; ctx.beginPath(); ctx.ellipse(x+w/2-18,y+42,22,14,0,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#444'; ctx.beginPath(); ctx.ellipse(x+w/2-18,y+38,20,12,0,0,2*Math.PI); ctx.fill(); if(active){ ctx.fillStyle='#ff7700'; ctx.beginPath(); ctx.ellipse(x+40,y+80,36,22,0,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#f44336'; for(let f=0;f<4;f++){ let h=18+Math.sin(frame*0.3+f)*8; ctx.fillRect(x+55+f*12,y+75-h,5,h); } ctx.fillStyle='#8d6e63'; ctx.beginPath(); ctx.ellipse(x+w/2-18,y+36,10,6,0,0,2*Math.PI); ctx.fill(); } if(ready) ctx.fillStyle='#4caf50'; else if(burnt) ctx.fillStyle='#3a1a0a'; else ctx.fillStyle='#1e272e'; if(ready||burnt) ctx.beginPath(); ctx.ellipse(x+w/2,y+45,65,34,0,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#a0a0a0'; ctx.beginPath(); ctx.arc(x+30,y+130,12,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#606060'; ctx.beginPath(); ctx.arc(x+30,y+130,8,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#a0a0a0'; ctx.beginPath(); ctx.arc(x+w-30,y+130,12,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#606060'; ctx.beginPath(); ctx.arc(x+w-30,y+130,8,0,2*Math.PI); ctx.fill(); ctx.shadowBlur=0; }
  function drawDetailedSink(x,y,w,h){ /*... giữ nguyên ...*/ ctx.shadowBlur=14; ctx.fillStyle='#8b8b8b'; ctx.fillRect(x,y,w,h); ctx.fillStyle='#aaa'; ctx.beginPath(); ctx.ellipse(x+45,y+50,38,22,0,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#87CEEB'; ctx.beginPath(); ctx.ellipse(x+45,y+50,28,16,0,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#777'; ctx.fillRect(x+40,y+10,6,20); ctx.fillStyle='#555'; ctx.beginPath(); ctx.ellipse(x+43,y+8,8,4,0,0,2*Math.PI); ctx.fill(); ctx.shadowBlur=0; }
  function drawDetailedPlateStation(x,y,w,h,cleanPlates){ /*... giữ nguyên ...*/ ctx.shadowBlur=14; ctx.fillStyle='#c0a080'; ctx.fillRect(x,y,w,h); for(let i=0;i<Math.min(cleanPlates,3);i++){ ctx.fillStyle='#e6ccb0'; ctx.beginPath(); ctx.ellipse(x+45,y+50-i*7,48,22,0,0,2*Math.PI); ctx.fill(); ctx.strokeStyle='#b08a62'; ctx.lineWidth=2; ctx.stroke(); } ctx.shadowBlur=0; }
  function drawDetailedTrash(x,y,w,h){ /*... giữ nguyên ...*/ ctx.shadowBlur=14; ctx.fillStyle='#6d4c41'; ctx.fillRect(x,y,w,h); ctx.fillStyle='#4d332a'; ctx.fillRect(x-10,y-12,w+20,16); ctx.fillStyle='#2a2a2a'; ctx.beginPath(); ctx.ellipse(x+45,y+8,42,14,0,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#444'; ctx.beginPath(); ctx.ellipse(x+45,y-2,34,10,0,0,2*Math.PI); ctx.fill(); ctx.font='42px Arial'; ctx.fillStyle='#f5e6d3'; ctx.fillText('🗑️',x+22,y+68); ctx.shadowBlur=0; }
  function drawDetailedCheckin(x,y,w,h){ /*... giữ nguyên ...*/ ctx.shadowBlur=12; ctx.fillStyle='#bca37c'; ctx.fillRect(x,y,w,h); ctx.fillStyle='#8b6b4a'; ctx.fillRect(x+5,y+5,w-10,8); ctx.fillStyle='#f0e6d2'; ctx.beginPath(); ctx.arc(x+35,y+25,10,0,2*Math.PI); ctx.fill(); ctx.fillStyle='#000'; ctx.font='bold 14px Arial'; ctx.fillText('🛎️',x+22,y+35); ctx.shadowBlur=0; }

  // ========== PATHFINDING & UTILS ==========
  function canMoveTo(nx,ny,r){ for(let rect of collisionRects){ if(rect===stove2&&!upgrades.extraStove)continue; const nearX=Math.max(rect.x,Math.min(nx,rect.x+rect.w)), nearY=Math.max(rect.y,Math.min(ny,rect.y+rect.h)); if((nx-nearX)**2+(ny-nearY)**2<r*r)return false; } return true; }
  function distToRect(px,py,rect){ const nearX=Math.max(rect.x,Math.min(px,rect.x+rect.w)), nearY=Math.max(rect.y,Math.min(py,rect.y+rect.h)); return Math.hypot(px-nearX,py-nearY); }
  function buildGrid(){ const grid=[]; for(let y=0;y<GRID_H;y++){grid[y]=[];for(let x=0;x<GRID_W;x++){grid[y][x]=canMoveTo(x*CELL+CELL/2,y*CELL+CELL/2,chef.r)?0:1;}} return grid; }
  function astar(sx,sy,gx,gy){ const grid=buildGrid(); let start={x:Math.floor(sx/CELL),y:Math.floor(sy/CELL)}, goal={x:Math.floor(gx/CELL),y:Math.floor(gy/CELL)}; if(start.x<0||start.x>=GRID_W||start.y<0||start.y>=GRID_H||goal.x<0||goal.x>=GRID_W||goal.y<0||goal.y>=GRID_H)return[]; if(grid[start.y][start.x]!==0){for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const nx=start.x+dx,ny=start.y+dy;if(nx>=0&&nx<GRID_W&&ny>=0&&ny<GRID_H&&grid[ny][nx]===0){start={x:nx,y:ny};dy=2;dx=2;}}if(grid[start.y][start.x]!==0)return[];} if(grid[goal.y][goal.x]!==0){let found=false;for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){const nx=goal.x+dx,ny=goal.y+dy;if(nx>=0&&nx<GRID_W&&ny>=0&&ny<GRID_H&&grid[ny][nx]===0){goal={x:nx,y:ny};found=true;dy=3;dx=3;}}if(!found)return[];} const open=[],closed=new Set(),key=(x,y)=>`${x},${y}`; const g={},h={},f={},parent={}; const sk=key(start.x,start.y);g[sk]=0;h[sk]=Math.abs(start.x-goal.x)+Math.abs(start.y-goal.y);f[sk]=h[sk];open.push({x:start.x,y:start.y,f:f[sk]}); while(open.length>0){ open.sort((a,b)=>a.f-b.f); const cur=open.shift(),ck=key(cur.x,cur.y); if(cur.x===goal.x&&cur.y===goal.y){ const p=[];let ck2=ck; while(parent[ck2]){const[px,py]=parent[ck2].split(',').map(Number);p.unshift({x:px*CELL+CELL/2,y:py*CELL+CELL/2});ck2=key(px,py);} p.push({x:gx,y:gy});return p; } closed.add(ck); for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){ if(dx===0&&dy===0)continue; const nx=cur.x+dx,ny=cur.y+dy; if(nx<0||nx>=GRID_W||ny<0||ny>=GRID_H||grid[ny][nx]===1)continue; const nk=key(nx,ny);if(closed.has(nk))continue; const ng=g[ck]+(dx&&dy?1.414:1); if(g[nk]===undefined||ng<g[nk]){g[nk]=ng;h[nk]=Math.abs(nx-goal.x)+Math.abs(ny-goal.y);f[nk]=g[nk]+h[nk];parent[nk]=ck;if(!open.find(o=>o.x===nx&&o.y===ny))open.push({x:nx,y:ny,f:f[nk]});} } } return[]; }

  // TÌM ĐIỂM ĐỨNG GẦN STATION (MỚI)
  function findNearbyPoint(station){
    const cx = station.x + station.w/2;
    const cy = station.y + station.h/2;
    // Xác định hướng từ đầu bếp đến tâm station
    const dx = chef.x - cx;
    const dy = chef.y - cy;
    const dist = Math.hypot(dx, dy);
    let dirX = 0, dirY = 0;
    if (dist > 0) { dirX = dx / dist; dirY = dy / dist; }
    // Tìm điểm cách station một khoảng chef.r + 5 theo hướng đó
    let px = cx + dirX * (Math.max(station.w, station.h)/2 + chef.r + 8);
    let py = cy + dirY * (Math.max(station.w, station.h)/2 + chef.r + 8);
    if (canMoveTo(px, py, chef.r)) return {x:px, y:py};
    // Thử các hướng khác nếu không được
    const offsets = [
      {dx:1, dy:0}, {dx:-1, dy:0}, {dx:0, dy:1}, {dx:0, dy:-1},
      {dx:1, dy:1}, {dx:-1, dy:1}, {dx:1, dy:-1}, {dx:-1, dy:-1}
    ];
    for (let off of offsets) {
      px = cx + off.dx * (station.w/2 + chef.r + 10);
      py = cy + off.dy * (station.h/2 + chef.r + 10);
      if (canMoveTo(px, py, chef.r)) return {x:px, y:py};
    }
    // fallback: trả về điểm sát station phía bên phải
    return {x: station.x + station.w + chef.r + 10, y: cy};
  }

  function setTarget(tx,ty){
    if(!canMoveTo(tx,ty,chef.r)){for(let dy=-20;dy<=20;dy+=10)for(let dx=-20;dx<=20;dx+=10){if(canMoveTo(tx+dx,ty+dy,chef.r)){tx+=dx;ty+=dy;dy=30;dx=30;}}}
    target={x:tx,y:ty}; path=astar(chef.x,chef.y,tx,ty);
  }

  function showMessage(txt,isGood=true){msgPopup.style.display='block';msgPopup.textContent=txt;msgPopup.style.color=isGood?'#ffdfa0':'#ff8a8a';popupTimer=80;}
  function showStars(count){starText='⭐'.repeat(count);starShowTimer=90;starPopup.style.display='block';starPopup.textContent=starText;}
  function updateUI(){ moneySpan.textContent=money;repSpan.textContent=reputation;daySpan.textContent=day;targetSpan.textContent=dayTarget;earnedSpan.textContent=earnedToday; if(chef.inventory){if(chef.inventory.type==='plate')invSpan.textContent='Đĩa: '+(chef.inventory.items.map(i=>i.id).join(' ')||'trống');else if(chef.inventory.type==='dirty')invSpan.textContent='Đĩa bẩn';else invSpan.textContent=chef.inventory.id;}else invSpan.textContent='Trống'; }
  function isChefNear(rect,extra=0){ return distToRect(chef.x,chef.y,rect)<chef.r+extra; }

  function assignSeats(groupSize){ for(let t of tables){ const taken=customers.filter(c=>c.table===t&&c.state!=='leaving').length; if(taken+groupSize<=2){const seats=t.seats.slice(taken,taken+groupSize);if(seats.length===groupSize)return seats;} } return null; }

  function openFridge(){ let html='<div style="font-size:20px;">Tủ lạnh</div>'; const names={tomato:'Cà chua',meat:'Thịt',bread:'Bánh mì',lettuce:'Rau',cheese:'Phô mai'}; for(let[id,count]of Object.entries(fridgeInventory)){html+=`<div class="fridge-item" onclick="window._takeFromFridge('${id}')">${names[id]} (${count})</div>`;} html+='<div style="margin-top:8px;"><button class="btn" style="font-size:16px;padding:6px 20px;" onclick="window._closeFridge()">Đóng</button></div>'; fridgePopup.innerHTML=html;fridgePopup.style.display='block';showFridgePopup=true; }
  window._takeFromFridge=function(item){if(fridgeInventory[item]>0&&!chef.inventory){fridgeInventory[item]--;chef.inventory={type:'ingredient',id:item};showMessage('Lấy '+item);playSfx('pick');}window._closeFridge();};
  window._closeFridge=function(){fridgePopup.style.display='none';showFridgePopup=false;};

  function tryInteract(){
    if(gameState!=='playing')return false;
    if(showFridgePopup){window._closeFridge();return true;}
    if(isChefNear(checkinDesk,15)&&customerQueue.length>0){
      const c=customerQueue.shift();const seats=assignSeats(c.groupSize);
      if(seats){c.state='moving_to_table';c.seatAssigned=seats;c.table=tables.find(t=>t.seats.includes(seats[0]));c.destX=seats[0].x;c.destY=seats[0].y;c.orderKey=Object.keys(RECIPES)[Math.floor(Math.random()*2)];c.patience=BASE_PATIENCE+upgrades.patienceBonus*40;c.maxPatience=c.patience;customers.push(c);showMessage('Khách đã ngồi!');playSfx('serve');return true;}
      else{showMessage('Hết bàn!',false);return false;}
    }
    for(let s of allStations){
      if(s===stove2&&!upgrades.extraStove)continue;
      if(!isChefNear(s,25))continue;
      if(s.type==='fridge'){openFridge();return true;}
      if(s.type==='plate'){
        if(!chef.inventory&&cleanPlates>0){chef.inventory={type:'plate',items:[]};cleanPlates--;showMessage('Lấy đĩa sạch');playSfx('pick');return true;}
        else if(chef.inventory?.type==='ingredient'){const ing=chef.inventory;if(ing.id.includes('chopped')||ing.id==='cheese'||ing.id==='bread'||ing.id.includes('cooked')){chef.inventory={type:'plate',items:[ing]};showMessage(`Thêm ${ing.id}`);playSfx('pick');return true;}else showMessage('Chưa sơ chế!',false);}
        else if(chef.inventory?.type==='dirty')showMessage('Đĩa bẩn! Rửa đi',false);
        return false;
      }
      if(s.type==='sink'){if(chef.inventory?.type==='dirty'){chef.inventory=null;dirtyPlates--;cleanPlates++;showMessage('Đã rửa');return true;}showMessage('Cần đĩa bẩn',false);return false;}
      if(s.type==='board'){if(chef.inventory?.type==='ingredient'&&!board.active){if(chef.inventory.id==='tomato'||chef.inventory.id==='lettuce'||chef.inventory.id==='meat'){board.active=true;board.progress=0;board.item={...chef.inventory};chef.inventory=null;showMessage('Thái...');playSfx('chop');return true;}else showMessage('Không thái được',false);}else showMessage(board.active?'Thớt bận':'Cần nguyên liệu',false);return false;}
      if(s.type==='stove')return handleStove(s);
      if(s.type==='trash'){if(chef.inventory){if(chef.inventory.type==='dirty')dirtyPlates--;chef.inventory=null;showMessage('Đã vứt');return true;}showMessage('Tay trống',false);return false;}
    }
    for(let c of customers){
      if(c.state==='waiting_food'&&isChefNear({x:c.x-30,y:c.y-30,w:60,h:60},25)&&chef.inventory?.type==='plate'){
        const plate=chef.inventory;const needed=RECIPES[c.orderKey].ingredients;const ids=plate.items.map(i=>i.id);
        if(needed.every(r=>ids.includes(r))&&ids.length===needed.length){
          const patienceRatio=c.patience/c.maxPatience;let stars=patienceRatio>0.7?3:patienceRatio>0.4?2:1;
          const multiplier=[0,0.6,0.8,1.0][stars];const earned=Math.floor(RECIPES[c.orderKey].price*multiplier);
          money+=earned;earnedToday+=earned;reputation=Math.min(100,reputation+stars*2);
          chef.inventory=null;c.state='eating';c.eatTimer=120;c.dirtyPlateLeft=true;
          showMessage(`+${earned}$`);playSfx('serve');showStars(stars);
          particles.push({x:c.x,y:c.y,life:40,color:'#FFD700',size:6});return true;
        }else showMessage('Sai món!',false);
      }
    }
    return false;
  }

  function handleStove(st){
    if(st.burnt){showMessage('Cháy rồi!',false);return false;}
    if(st.ready){if(!chef.inventory){chef.inventory=st.cookedItem;st.ready=false;showMessage('Lấy '+st.cookedItem.id);playSfx('pick');return true;}else{showMessage('Tay đầy',false);return false;}}
    if(st.active){showMessage('Đang nấu',false);return false;}
    if(board.active&&board.progress>=board.max&&board.item){
      const ing=board.item;if(ing.id==='meat'||ing.id==='bread'||ing.id==='cheese'){st.active=true;st.progress=0;st.cookedItem={type:'ingredient',id:ing.id+'_cooked'};board.active=false;board.item=null;showMessage('Nấu...');playSfx('cook');return true;}else showMessage('Không nấu được',false);
    }else showMessage('Chưa có đồ',false);
    return false;
  }

  function spawnCustomer(){if(customerQueue.length>=3)return;const groupSize=Math.random()<0.4?2:1;customerQueue.push({x:820,y:380+customerQueue.length*40,groupSize,patience:BASE_PATIENCE,maxPatience:BASE_PATIENCE,variant:Math.floor(Math.random()*6),state:'waiting_checkin'});}

  function updateGame(){
    if(gameState!=='playing')return;
    frame++;
    if(path.length>0){const next=path[0];const dx=next.x-chef.x,dy=next.y-chef.y,dist=Math.hypot(dx,dy);const sp=BASE_SPEED*upgrades.speed;if(dist<sp){chef.x=next.x;chef.y=next.y;path.shift();if(path.length===0)target=null;}else{chef.x+=(dx/dist)*sp;chef.y+=(dy/dist)*sp;chef.faceDir=Math.sign(dx)||chef.faceDir;}chef.walkFrame=(chef.walkFrame+0.3)%(Math.PI*2);}
    if(board.active){board.progress+=2.2*upgrades.chopSpeed;if(board.progress>=board.max){board.active=false;if(board.item)board.item.id+=board.item.id.includes('chopped')?'':'_chopped';showMessage('Thái xong');particles.push({x:board.x+65,y:board.y+45,life:35,color:'#8B4513',size:5});}}
    [stove,stove2].forEach(st=>{if(!st.unlocked&&st===stove2)return;if(st.active){st.progress+=upgrades.cookSpeed;if(st.progress>=st.max){st.active=false;st.ready=true;st.burnTimer=0;particles.push({x:st.x+80,y:st.y+60,life:35,color:'#ddd',size:10});}}if(st.ready){st.burnTimer++;if(st.burnTimer>300){st.burnt=true;st.ready=false;}}});
    for(let c of customerQueue){c.patience--;if(c.patience<=0){reputation=Math.max(0,reputation-8);customerQueue=customerQueue.filter(q=>q!==c);}}
    customers=customers.filter(c=>{
      if(c.state==='moving_to_table'){const dx=c.destX-c.x,dy=c.destY-c.y,dist=Math.hypot(dx,dy);if(dist<2){c.x=c.destX;c.y=c.destY;c.state='seated';}else{c.x+=(dx/dist)*3;c.y+=(dy/dist)*3;}}
      else if(c.state==='seated'){c.state='waiting_food';}else if(c.state==='waiting_food'){c.patience--;if(c.patience<=0){reputation=Math.max(0,reputation-10);showMessage('Khách bỏ đi',false);return false;}}else if(c.state==='eating'){c.eatTimer--;if(c.eatTimer<=0){c.state='leaving';if(c.dirtyPlateLeft)dirtyPlates++;}}else if(c.state==='leaving')return false;
      return true;
    });
    if(Math.random()<0.005)spawnCustomer();
    if(earnedToday>=dayTarget){gameState='shop';document.getElementById('shopMenu').classList.remove('hidden');renderShop();}
    if(reputation<=0){gameState='gameover';document.getElementById('gameoverMenu').classList.remove('hidden');}
    particles=particles.filter(p=>{p.life-=1.5;return p.life>0;});

    nearObject=null;
    for(let s of allStations){if(s===stove2&&!upgrades.extraStove)continue;if(isChefNear(s,25)){nearObject=s;break;}}
    if(!nearObject)for(let c of customers){if(c.state==='waiting_food'&&isChefNear({x:c.x-30,y:c.y-30,w:60,h:60},25)){nearObject=c;break;}if(c.state==='waiting_checkin'&&isChefNear(checkinDesk,25))nearObject=checkinDesk;}
    interactHint.textContent=nearObject?(nearObject.name?`👆 ${nearObject.name}`:(nearObject.orderKey?`👆 Khách`:'👆 Nhận khách')):'';
    if(popupTimer>0){popupTimer--;if(popupTimer===0)msgPopup.style.display='none';}
    if(starShowTimer>0){starShowTimer--;if(starShowTimer===0)starPopup.style.display='none';}
    updateUI();
  }

  function draw(){
    ctx.clearRect(0,0,CW,CH);ctx.save();ctx.scale(SCALE_X,SCALE_Y);
    const bgGrad=ctx.createRadialGradient(400,350,150,700,600,1000);bgGrad.addColorStop(0,'#1c3a4a');bgGrad.addColorStop(1,'#07131a');
    ctx.fillStyle=bgGrad;ctx.fillRect(0,0,GAME_W,GAME_H);
    for(let i=0;i<780;i+=50)for(let j=0;j<GAME_H;j+=50){ctx.fillStyle=(i+j)%100===0?'#2d5f73':'#1f485b';ctx.fillRect(i,j,48,48);}
    for(let i=780;i<GAME_W;i+=45)for(let j=0;j<GAME_H;j+=45){ctx.fillStyle='#7a5a3a';ctx.fillRect(i,j,43,43);ctx.fillStyle='#624a2e';ctx.fillRect(i+4,j+4,35,35);}
    ctx.fillStyle='#6d4f33';ctx.shadowBlur=15;ctx.fillRect(780,300,20,500);ctx.fillStyle='#8b6946';ctx.fillRect(784,304,12,490);ctx.shadowBlur=0;

    drawDetailedFridge(fridge.x,fridge.y,fridge.w,fridge.h);
    drawDetailedBoard(board.x,board.y,board.w,board.h,board.active,board.progress,board.max,board.item);
    drawDetailedStove(stove.x,stove.y,stove.w,stove.h,stove.active,stove.ready,stove.burnt,stove.progress,stove.max);
    if(upgrades.extraStove) drawDetailedStove(stove2.x,stove2.y,stove2.w,stove2.h,stove2.active,stove2.ready,stove2.burnt,stove2.progress,stove2.max);
    drawDetailedSink(sink.x,sink.y,sink.w,sink.h);
    drawDetailedPlateStation(plateStation.x,plateStation.y,plateStation.w,plateStation.h,cleanPlates);
    drawDetailedTrash(trash.x,trash.y,trash.w,trash.h);
    drawDetailedCheckin(checkinDesk.x,checkinDesk.y,checkinDesk.w,checkinDesk.h);

    tables.forEach(t=>{ ctx.shadowBlur=14; ctx.fillStyle='#b87333'; ctx.fillRect(t.x,t.y,t.w,t.h); ctx.fillStyle='#d49c6b'; ctx.fillRect(t.x+8,t.y+8,t.w-16,12); ctx.fillStyle='#e6d5b8'; ctx.fillRect(t.x+12,t.y+22,t.w-24,60); ctx.shadowBlur=0; });

    customerQueue.forEach(c=>drawAnimal(c));
    customers.forEach(c=>drawAnimal(c));
    drawChef();

    particles.forEach(p=>{ctx.globalAlpha=p.life/40;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size||5,0,2*Math.PI);ctx.fill();ctx.globalAlpha=1;});
    ctx.restore();
  }

  function renderShop(){const container=document.getElementById('shopItemsContainer');container.innerHTML='';const items=[{name:'Tốc độ',cost:60,action:()=>upgrades.speed=1.4},{name:'Dao sắc',cost:50,action:()=>upgrades.chopSpeed=1.8},{name:'Bếp từ',cost:70,action:()=>upgrades.cookSpeed=1.8},{name:'Bếp phụ',cost:120,action:()=>{upgrades.extraStove=true;stove2.unlocked=true}},{name:'Kiên nhẫn',cost:40,action:()=>upgrades.patienceBonus++}];items.forEach(it=>{const d=document.createElement('div');d.className='shop-item';d.innerHTML=`<strong>${it.name}</strong><br>$${it.cost}`;const b=document.createElement('button');b.textContent='MUA';b.className='btn';b.onclick=()=>{if(money>=it.cost){money-=it.cost;it.action();renderShop();}else showMessage('Không đủ tiền',false);};d.appendChild(b);container.appendChild(d);});}
  function nextDay(){day++;dayTarget=Math.floor(dayTarget*1.6);earnedToday=0;reputation=Math.min(100,reputation+10);customers=[];customerQueue=[];board.active=stove.active=stove2.active=false;stove.ready=stove2.ready=false;cleanPlates=4;dirtyPlates=0;gameState='playing';document.getElementById('shopMenu').classList.add('hidden');updateUI();}

  function handleStart(e){
    e.preventDefault();if(gameState==='tutorial'){tutorialStep();return;}if(gameState!=='playing')return;
    if(showFridgePopup){window._closeFridge();return;}
    const rect=canvas.getBoundingClientRect();const scaleX=CW/rect.width,scaleY=CH/rect.height;
    let cx,cy;if(e.touches){cx=e.touches[0].clientX;cy=e.touches[0].clientY;}else{cx=e.clientX;cy=e.clientY;}
    let gx=((cx-rect.left)*scaleX)/SCALE_X, gy=((cy-rect.top)*scaleY)/SCALE_Y;
    if(gx<0||gx>GAME_W||gy<0||gy>GAME_H)return;

    // Kiểm tra nhấn vào station
    for(let s of allStations){
      if(s===stove2&&!upgrades.extraStove)continue;
      const d=distToRect(gx,gy,s);
      if(d<40){
        if(isChefNear(s,25)){tryInteract();return;}
        else{const nearby = findNearbyPoint(s); setTarget(nearby.x, nearby.y); return;}
      }
    }
    // Kiểm tra khách
    for(let c of customers){
      if(Math.hypot(gx-c.x,gy-c.y)<35&&c.state==='waiting_food'){
        if(isChefNear({x:c.x-30,y:c.y-30,w:60,h:60},25)){tryInteract();return;}
        else{setTarget(c.x,c.y);return;}
      }
    }
    setTarget(gx,gy);
  }

  // Tutorial (giữ nguyên)
  let tutorialMode=null, tutorialStepIdx=0, tutorialTimer=null;
  const tutorialSteps={
    'pizza':[{action:'move',to:fridge},{action:'take',item:'tomato'},{action:'move',to:board},{action:'interact',station:'board'},{action:'move',to:fridge},{action:'take',item:'cheese'},{action:'move',to:plateStation},{action:'interact',station:'plate'},{action:'move',to:fridge},{action:'take',item:'bread'},{action:'move',to:plateStation},{action:'interact',station:'plate'}],
    'burger':[{action:'move',to:fridge},{action:'take',item:'meat'},{action:'move',to:board},{action:'interact',station:'board'},{action:'move',to:stove},{action:'interact',station:'stove'},{action:'move',to:fridge},{action:'take',item:'lettuce'},{action:'move',to:board},{action:'interact',station:'board'},{action:'move',to:plateStation},{action:'interact',station:'plate'},{action:'move',to:stove},{action:'interact',station:'stove'},{action:'move',to:plateStation},{action:'interact',station:'plate'},{action:'move',to:fridge},{action:'take',item:'bread'},{action:'move',to:plateStation},{action:'interact',station:'plate'}]
  };
  function startTutorial(recipe){tutorialMode=recipe;tutorialStepIdx=0;gameState='tutorial';document.getElementById('tutorialOverlay').classList.add('hidden');document.getElementById('mainMenu').classList.add('hidden');resetGameState();chef.x=400;chef.y=500;executeTutorialStep();}
  function resetGameState(){money=250;reputation=100;day=1;dayTarget=300;earnedToday=0;chef.inventory=null;board.active=stove.active=stove2.active=false;stove.ready=stove2.ready=false;customers=[];cleanPlates=4;dirtyPlates=0;customerQueue=[];upgrades={speed:1,chopSpeed:1,cookSpeed:1,extraStove:false,patienceBonus:0};stove2.unlocked=false;fridgeInventory={tomato:3,meat:3,bread:3,lettuce:3,cheese:3};path=[];target=null;}
  function executeTutorialStep(){if(!tutorialMode||gameState!=='tutorial')return;if(tutorialStepIdx>=tutorialSteps[tutorialMode].length){showMessage('Hoàn thành!');gameState='menu';document.getElementById('mainMenu').classList.remove('hidden');tutorialMode=null;return;}const step=tutorialSteps[tutorialMode][tutorialStepIdx];if(step.action==='move'){const tx=step.to.x+step.to.w/2,ty=step.to.y+step.to.h/2;const moveInterval=setInterval(()=>{const dx=tx-chef.x,dy=ty-chef.y,dist=Math.hypot(dx,dy);if(dist<15){chef.x=tx;chef.y=ty;clearInterval(moveInterval);tutorialStepIdx++;executeTutorialStep();}else{chef.x+=(dx/dist)*4;chef.y+=(dy/dist)*4;chef.walkFrame=(chef.walkFrame+0.3)%(Math.PI*2);}},30);tutorialTimer=moveInterval;}else if(step.action==='take'){if(fridgeInventory[step.item]>0){fridgeInventory[step.item]--;chef.inventory={type:'ingredient',id:step.item};}setTimeout(()=>{tutorialStepIdx++;executeTutorialStep();},500);}else if(step.action==='interact'){if(step.station==='board'){if(chef.inventory?.type==='ingredient'){board.active=true;board.progress=0;board.item={...chef.inventory};board.max=60;chef.inventory=null;const simInterval=setInterval(()=>{board.progress+=4;if(board.progress>=board.max){board.active=false;board.item.id+=board.item.id.includes('chopped')?'':'_chopped';clearInterval(simInterval);setTimeout(()=>{tutorialStepIdx++;executeTutorialStep();},600);}},100);}else{chef.inventory={type:'ingredient',id:'tomato'};setTimeout(()=>{tutorialStepIdx++;executeTutorialStep();},400);}}else if(step.station==='stove'){if(stove.ready){chef.inventory=stove.cookedItem;stove.ready=false;setTimeout(()=>{tutorialStepIdx++;executeTutorialStep();},500);}else if(!stove.active&&board.item){stove.active=true;stove.progress=0;stove.max=80;stove.cookedItem={type:'ingredient',id:board.item.id+'_cooked'};board.active=false;board.item=null;const simInterval=setInterval(()=>{stove.progress+=4;if(stove.progress>=stove.max){stove.active=false;stove.ready=true;clearInterval(simInterval);}},100);setTimeout(()=>{tutorialStepIdx++;executeTutorialStep();},2500);}else{setTimeout(()=>{tutorialStepIdx++;executeTutorialStep();},400);}}else if(step.station==='plate'){if(!chef.inventory){chef.inventory={type:'plate',items:[]};cleanPlates--;}else if(chef.inventory.type==='ingredient'){chef.inventory={type:'plate',items:[chef.inventory]};}setTimeout(()=>{tutorialStepIdx++;executeTutorialStep();},500);}}}

  function resetGame(){if(tutorialTimer)clearInterval(tutorialTimer);resetGameState();gameState='playing';document.getElementById('mainMenu').classList.add('hidden');document.getElementById('pauseMenu').classList.add('hidden');document.getElementById('shopMenu').classList.add('hidden');document.getElementById('gameoverMenu').classList.add('hidden');document.getElementById('tutorialOverlay').classList.add('hidden');}
  document.getElementById('startGameBtn').onclick=()=>{resetGame();initAudio();};
  document.getElementById('tutorialMenuBtn').onclick=()=>{document.getElementById('mainMenu').classList.add('hidden');document.getElementById('tutorialOverlay').classList.remove('hidden');};
  document.getElementById('tutBack').onclick=()=>{document.getElementById('tutorialOverlay').classList.add('hidden');document.getElementById('mainMenu').classList.remove('hidden');};
  document.getElementById('tutPizza').onclick=()=>startTutorial('pizza');document.getElementById('tutBurger').onclick=()=>startTutorial('burger');
  document.getElementById('resumeBtn').onclick=()=>{gameState='playing';document.getElementById('pauseMenu').classList.add('hidden');};
  document.getElementById('pauseBtn').onclick=()=>{if(gameState==='playing'){gameState='paused';document.getElementById('pauseMenu').classList.remove('hidden');}};
  document.getElementById('quitToMenuBtn').onclick=()=>{gameState='menu';document.getElementById('mainMenu').classList.remove('hidden');document.getElementById('pauseMenu').classList.add('hidden');};
  document.getElementById('restartBtn').onclick=()=>{resetGame();};document.getElementById('nextDayBtn').onclick=nextDay;
  canvas.addEventListener('touchstart',handleStart,{passive:false});canvas.addEventListener('mousedown',handleStart);
  canvas.addEventListener('touchmove',(e)=>e.preventDefault(),{passive:false});
  function gameLoop(){if(gameState==='playing')updateGame();draw();requestAnimationFrame(gameLoop);}
  gameLoop();updateUI();
})();
</script>
